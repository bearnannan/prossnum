ระหว่างรอผมรันคำสั่งติดตั้งไลบรารีที่จำเป็นสำหรับหน้าเว็บ (เช่น ระบบแผนที่ ระบบกราฟชาร์ต และระบบต่อ Google Sheets)

ผมขอเข้าสู่ขั้นตอนการ เชื่อมต่อ Database (Google Sheets API) ครับ

เพื่อให้ Web App 3.0 สามารถ "เขียนข้อมูล/อัปเดตข้อมูล" กลับไปที่ Google Sheets ของคุณวัชระได้ เราจำเป็นต้องใช้ Google Cloud Service Account ครับ (เพราะลิงก์ CSV เดิมที่เคยใช้ มันใช้อ่านได้อย่างเดียวครับ)

รบกวนคุณวัชระทำตามขั้นตอนนี้เพื่อรับไฟล์ Key (JSON) หน่อยนะครับ:

ไปที่เว็บ https://console.cloud.google.com/ (ล็อกอินด้วยบัญชี Google)
สร้าง Project ใหม่ (ถ้ายังไม่มี)
ไปที่เมนู API & Services > Library แล้วค้นหาคำว่า Google Sheets API จากนั้นกดปุ่ม "Enable" (เปิดใช้งาน)
ไปที่เมนู IAM & Admin > Service Accounts
กดปุ่ม + CREATE SERVICE ACCOUNT ด้านบน (ตั้งชื่ออะไรก็ได้ เช่น progress-webapp-bot) แล้วกด Create and Continue ไปจนจบ
เมื่อสร้างเสร็จแล้ว ให้กดที่ชื่ออีเมลของ Service Account ที่เพิ่งสร้าง (... @ ...iam.gserviceaccount.com)
ด้านบนให้กดแท็บ KEYS > ADD KEY > Create new key
เลือก JSON แล้วกด Create (มันจะดาวน์โหลดไฟล์ .json ลงมาที่เครื่องคุณวัชระ)
สเตปสุดท้ายที่สำคัญมาก:

ก๊อปปี้ "อีเมลของ Service Account" จากหน้าเมื่อกี้ (ข้อ 6)
กลับไปเปิดไฟล์ Google Sheets ของคุณวัชระ
กดปุ่ม "แชร์" (Share) สีเขียวมุมขวาบน
วางอีเมลนั้นลงไป และตั้งสิทธิ์เป็น "Editor" (ผู้มีสิทธิ์แก้ไข) แล้วกดส่งครับ
ถ้าทำเสร็จแล้ว รบกวนเอาไฟล์อัปโหลด .json ที่โหลดมาเมื่อกี้ โยนใส่ในแชทนี้ได้เลยครับ! (หรือจะก๊อปปี้ข้อความข้างในมันมาแปะก็ได้ครับ) ถ้าติดขัดตรงไหนบอกผมได้เลยนะครับ ผมจะไกด์ให้ทีละสเตปครับ

