import matplotlib.pyplot as plt
from matplotlib.font_manager import FontProperties
import urllib.request
import os

# 1. ดาวน์โหลดฟอนต์ภาษาไทย (Sarabun จาก Google Fonts)
font_url = "https://github.com/google/fonts/raw/main/ofl/sarabun/Sarabun-Regular.ttf"
font_path = "Sarabun-Regular.ttf"

if not os.path.exists(font_path):
    print("กำลังดาวน์โหลดฟอนต์ Sarabun...")
    urllib.request.urlretrieve(font_url, font_path)

# กำหนดสไตล์ฟอนต์
font_normal = FontProperties(fname=font_path, size=14)
font_bold = FontProperties(fname=font_path, size=16, weight='bold')
font_header = FontProperties(fname=font_path, size=24, weight='bold')

# 2. ฟังก์ชันจัดรูปแบบเปอร์เซ็นต์
def pbar(percent):
    if percent == 0:
        return "รอเริ่มดำเนินการ"
    return f"{percent}%"

# 3. ข้อมูลของแต่ละอำเภอ
columns = ["ลำดับ", "ชื่อสถานีลูกข่าย", "Type", "ความคืบหน้าฐานราก", "งานติดตั้งเสา"]

data_hk = [
    ["1", "หมู่ 2 วังมะค่า", "C", pbar(95), pbar(25)],
    ["2", "หมู่ 4 วังไผ่", "B", pbar(95), pbar(25)],
    ["3", "หมู่ 3 นาตามิ่ง", "B", pbar(95), pbar(25)],
    ["4", "หมู่ 6 หนองตายอด", "C", pbar(95), pbar(25)],
    ["5", "หมู่ 9 บ่อทอง", "C", pbar(95), pbar(25)],
    ["6", "หมู่ 10 หนองโก", "C", pbar(85), pbar(0)],
    ["7", "หมู่ 6 ห้วยลึก", "C", pbar(85), pbar(0)],
    ["8", "หมู่ 9 ดงรัง", "B", pbar(85), pbar(0)],
    ["9", "หมู่ 12 กรอกตาโพธิ์", "B", pbar(85), pbar(0)],
    ["10", "หมู่ 13 หนองปลอดภัย", "C", pbar(85), pbar(0)],
    ["11", "หมู่ 7 หนองเจริญสุข", "B", pbar(85), pbar(0)],
]

data_lk = [
    ["1", "หมู่ 3 ตลุงเหนือ", "B", pbar(85), pbar(0)],
    ["2", "หมู่ 9 เหียงงาม", "C", pbar(85), pbar(0)],
    ["3", "หมู่ 5 หนองปรือ", "C", pbar(60), pbar(0)],
    ["4", "หมู่ 11 หนองตาเกิด", "B", pbar(60), pbar(0)],
    ["5", "หมู่ 6 น้ำโจน", "C", pbar(60), pbar(0)],
    ["6", "หมู่ 8 ชัฎดงพลับ", "C", pbar(40), pbar(0)],
    ["7", "หมู่ 13 หนองจิกน้ำดำ", "C", pbar(40), pbar(0)],
    ["8", "หมู่ 6 สี่กั๊ก", "C", pbar(40), pbar(0)],
