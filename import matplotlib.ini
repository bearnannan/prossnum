    ["10", "หมู่ 4 หนองจั่น", "C", pbar(40), pbar(0)],
    ["11", "หมู่ 9 หนองข่อย", "C", pbar(40), pbar(0)],
]

# 4. ตั้งค่าหน้ากระดาษ (Figure) สำหรับสร้างตาราง
fig = plt.figure(figsize=(16, 15))
fig.patch.set_facecolor('#f8fafc') # พื้นหลังสีเทาอ่อน สไตล์ Bento

# ใส่หัวข้อรายงาน
plt.figtext(0.5, 0.95, "รายงานความคืบหน้างานก่อสร้างฐานรากและติดตั้งเสาสัญญาณ 9 เมตร", 
            ha="center", fontproperties=font_header, color="#0f172a")
plt.figtext(0.5, 0.92, "ข้อมูลอัปเดต: 27 กุมภาพันธ์ 2569 | พื้นที่: จ.กาญจนบุรี เขต 11 (เพชรบุรี)", 
            ha="center", fontproperties=font_bold, color="#475569")

# 5. ฟังก์ชันวาดตาราง
def draw_table(ax, title, data, header_color):
    ax.axis('off')
    # ใส่ชื่อตาราง
    ax.set_title(title, fontproperties=font_bold, color="#1e293b", pad=15, loc='left', fontsize=18)
    
    col_widths = [0.08, 0.3, 0.1, 0.26, 0.26] # สัดส่วนความกว้างคอลัมน์
    table = ax.table(cellText=data, colLabels=columns, cellLoc='center', loc='center', colWidths=col_widths)
    table.auto_set_font_size(False)
    
    # ปรับแต่งสีและฟอนต์ในแต่ละเซลล์
    for (row, col), cell in table.get_celld().items():
        cell.set_edgecolor('#e2e8f0') # สีเส้นขอบตาราง
        cell.set_height(0.08) # ความสูงแถว
        
        # หัวตาราง
        if row == 0:
            cell.set_facecolor(header_color)
            cell.set_text_props(fontproperties=font_bold, color='white')
        else:
            cell.set_text_props(fontproperties=font_normal, color="#334155")
            
            # ใส่สีพื้นหลังตามสถานะความคืบหน้าฐานราก
            if col == 3:
                val = data[row-1][3]
                if '95%' in val: cell.set_facecolor('#dcfce7') # เขียว
                elif '85%' in val: cell.set_facecolor('#fef9c3') # เหลือง
                elif '60%' in val: cell.set_facecolor('#ffedd5') # ส้ม
                elif '40%' in val: cell.set_facecolor('#fee2e2') # แดง
            
            # ใส่สีพื้นหลังตามสถานะงานเสา
            elif col == 4:
                val = data[row-1][4]
                if '25%' in val: cell.set_facecolor('#e0f2fe') # ฟ้า
                else: cell.set_facecolor('#f1f5f9') # เทา
            else:
                cell.set_facecolor('white')

# แบ่งพื้นที่วาดตาราง 2 ส่วน (อำเภอละ 1 ตาราง)
ax1 = fig.add_axes([0.05, 0.52, 0.9, 0.35])
draw_table(ax1, "อำเภอห้วยกระเจา (11 สถานี)", data_hk, '#3b82f6') # สีหัวตารางน้ำเงิน

ax2 = fig.add_axes([0.05, 0.1, 0.9, 0.35])
draw_table(ax2, "อำเภอเลาขวัญ (11 สถานี)", data_lk, '#8b5cf6') # สีหัวตารางม่วง

# 6. บันทึกรูปภาพ
plt.savefig('progress_bento_layout.png', dpi=200, bbox_inches='tight', facecolor=fig.get_facecolor())
print("✅ สร้างไฟล์รูปภาพสำเร็จ! บันทึกเป็นชื่อ 'progress_bento_layout.png'")